#############################################
#           tmux v3 ELITE CONFIG
#############################################

#############################
# CORE SETTINGS
#############################

unbind C-b
set -g prefix C-a
bind C-a send-prefix

set -g base-index 0
set -g detach-on-destroy off
set -g renumber-windows on
set -g history-limit 1000000

# Fast response, but safe for macOS + SSH
set -g escape-time 10

# Mouse support
set -g mouse on

#############################
# TERMINAL (tmux v3 best practice)
#############################

set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"

#############################
# CLIPBOARD (clean macOS approach)
#############################

set -g set-clipboard on

#############################
# APPEARANCE (UI)
#############################

set -g status-position bottom
set -g status-style "bg=default,fg=white"

set -g pane-base-index 0
set -g pane-border-style "fg=colour238"
set -g pane-active-border-style "fg=magenta"

set -g status-left-length 60
set -g status-right-length 120

#############################
# STATUS BAR (BOTTOM BANNER)
#############################

set -g status-left '#[fg=green] #S #[default]'
set -g status-right '#[fg=cyan]%Y-%m-%d #[fg=yellow]%H:%M '

# 👉 TMUX BANNER (center footer branding)
#set -g status-format[0] '#[align=centre fg=brightblack]⚡ tmux v3 ELITE SHELL SYSTEM ⚡ #[default]'

#############################
# KEY BINDINGS
#############################

# split panes (modern + intuitive)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind '\' split-window -h -c "#{pane_current_path}"

# window navigation (Shift arrows)
bind -n S-Left previous-window
bind -n S-Right next-window

# pane navigation fallback (vim style)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

#############################
# COPY MODE (vi-style)
#############################

setw -g mode-keys vi
set -g status-keys vi

bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi V send-keys -X select-line
bind-key -T copy-mode-vi r send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle

#############################
# QUICK RELOAD
#############################

bind r source-file ~/.tmux.conf \; display "tmux config reloaded"

#############################
# PLUGINS (TPM)
#############################

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'sainnhe/tmux-fzf'

# Continuum autosave
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

#############################
# TPM BOOTSTRAP
#############################

run '~/.tmux/plugins/tpm/tpm'

