# ~/.config/alacritty/alacritty.toml

[window]
opacity = 100.00
startup_mode = "Windowed"
option_as_alt = "Both"

[window.padding]
x = 10
y = 10

[font]
size = 19

[font.normal]
family = "JetBrainsMono Nerd Font"
style = "Regular"

[font.bold]
family = "JetBrainsMono Nerd Font"
style = "Bold"

[font.italic]
family = "JetBrainsMono Nerd Font"
style = "Italic"

[scrolling]
history = 50000
multiplier = 3

[selection]
save_to_clipboard = true

[cursor]
blink_interval = 750

[cursor.style]
shape = "Beam"
blinking = "On"

[terminal]
osc52 = "CopyPaste"

[terminal.shell]
program = "/bin/zsh"

[env]
TERM = "xterm-256color"

[keyboard]

bindings = [
  { key = "C", mods = "Command", action = "Copy" },
  { key = "V", mods = "Command", action = "Paste" },
  { key = "Equals", mods = "Command", action = "IncreaseFontSize" },
  { key = "Minus", mods = "Command", action = "DecreaseFontSize" },
  { key = "Key0", mods = "Command", action = "ResetFontSize" }
]

[colors.primary]
background = "#000000"
foreground = "#cdd6f4"

[colors.cursor]
cursor = "#f5e0dc"
text = "#1e1e2e"

[colors.normal]
black   = "#45475a"
red     = "#f38ba8"
green   = "#a6e3a1"
yellow  = "#f9e2af"
blue    = "#89b4fa"
magenta = "#f5c2e7"
cyan    = "#94e2d5"
white   = "#bac2de"

[colors.bright]
black   = "#585b70"
red     = "#f38ba8"
green   = "#a6e3a1"
yellow  = "#f9e2af"
blue    = "#89b4fa"
magenta = "#f5c2e7"
cyan    = "#94e2d5"
white   = "#a6adc8"


